global:
  scrape_interval: 15s

scrape_configs:
  - job_name: dbitlms-api-health
    metrics_path: /health/system
    scheme: http
    static_configs:
      - targets:
          - backend:5000

  - job_name: dbitlms-nginx
    metrics_path: /healthz
    scheme: http
    static_configs:
      - targets:
          - nginx:80
